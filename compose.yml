name: strategy-codebot

x-api-environment: &api-environment
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: strategy_codebot
  POSTGRES_USER: strategy_codebot
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-}
  OPENROUTER_EMBEDDINGS_API_BASE: ${OPENROUTER_EMBEDDINGS_API_BASE:-}
  OPENAI_EMBEDDINGS_API_BASE: ${OPENAI_EMBEDDINGS_API_BASE:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  LITELLM_API_KEY: ${LITELLM_API_KEY:-}
  LITELLM_PROXY_API_KEY: ${LITELLM_PROXY_API_KEY:-${LITELLM_MASTER_KEY:-}}
  LITELLM_PROXY_API_BASE: ${LITELLM_PROXY_API_BASE:-http://litellm-proxy:4000/v1}
  VERCEL_AI_GATEWAY_API_KEY: ${VERCEL_AI_GATEWAY_API_KEY:-}
  VERCEL_AI_GATEWAY_API_BASE: ${VERCEL_AI_GATEWAY_API_BASE:-}
  PORTKEY_API_KEY: ${PORTKEY_API_KEY:-}
  PORTKEY_API_BASE: ${PORTKEY_API_BASE:-}
  PORTKEY_VIRTUAL_KEY: ${PORTKEY_VIRTUAL_KEY:-}
  PORTKEY_CONFIG_ID: ${PORTKEY_CONFIG_ID:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
  FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
  DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
  STRATEGY_CODEBOT_API_ARTIFACT_ROOT: /var/lib/strategy-codebot/artifacts
  STRATEGY_CODEBOT_API_CORS_ORIGINS: ${STRATEGY_CODEBOT_API_CORS_ORIGINS:-}
  STRATEGY_CODEBOT_API_CORS_ORIGIN_REGEX: ${STRATEGY_CODEBOT_API_CORS_ORIGIN_REGEX:-}
  STRATEGY_CODEBOT_INTERNAL_AUTH_SECRET: ${STRATEGY_CODEBOT_INTERNAL_AUTH_SECRET:-}
  STRATEGY_CODEBOT_KNOWLEDGE_DATABASE_URL: postgresql://strategy_codebot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/strategy_codebot
  STRATEGY_CODEBOT_LLM_PROVIDER: ${STRATEGY_CODEBOT_LLM_PROVIDER:-}
  STRATEGY_CODEBOT_LLM_MODEL: ${STRATEGY_CODEBOT_LLM_MODEL:-}
  STRATEGY_CODEBOT_LLM_ROUTING: ${STRATEGY_CODEBOT_LLM_ROUTING:-registry}
  STRATEGY_CODEBOT_MODEL_REGISTRY: ${STRATEGY_CODEBOT_MODEL_REGISTRY:-configs/model-registry.example.yaml}
  STRATEGY_CODEBOT_LLM_ROUTE_TIMEOUT_SECONDS: ${STRATEGY_CODEBOT_LLM_ROUTE_TIMEOUT_SECONDS:-25}
  STRATEGY_CODEBOT_LLM_REQUEST_TIMEOUT_SECONDS: ${STRATEGY_CODEBOT_LLM_REQUEST_TIMEOUT_SECONDS:-}
  STRATEGY_CODEBOT_SERVER_USER_TIER: ${STRATEGY_CODEBOT_SERVER_USER_TIER:-paid_low}
  ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
  TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
  MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-auto}
  MARKET_DATA_TIMEOUT_MS: ${MARKET_DATA_TIMEOUT_MS:-6000}
  CCXT_EXCHANGE_ID: ${CCXT_EXCHANGE_ID:-binance}
  CCXT_FALLBACK_EXCHANGES: ${CCXT_FALLBACK_EXCHANGES:-binance,kraken,coinbase}
  CCXT_OHLCV_TIMEFRAME: ${CCXT_OHLCV_TIMEFRAME:-1h}
  CCXT_OHLCV_LIMIT: ${CCXT_OHLCV_LIMIT:-72}
  BACKTEST_ENGINE_DEFAULT: ${BACKTEST_ENGINE_DEFAULT:-pineforge}
  BACKTEST_PINEFORGE_ENABLED: ${BACKTEST_PINEFORGE_ENABLED:-1}
  BACKTEST_PINEFORGE_RUNNER_URL: ${BACKTEST_PINEFORGE_RUNNER_URL:-http://pineforge-runner:8080}
  STRATEGY_CODEBOT_BACKTEST_AUTO_CHAIN_ENABLED: ${STRATEGY_CODEBOT_BACKTEST_AUTO_CHAIN_ENABLED:-1}
  STRATEGY_CODEBOT_BACKTEST_AUTO_CHAIN_MAX_STEPS: ${STRATEGY_CODEBOT_BACKTEST_AUTO_CHAIN_MAX_STEPS:-4}
  STRATEGY_CODEBOT_CHAT_WORKER_LEASE_SECONDS: ${STRATEGY_CODEBOT_CHAT_WORKER_LEASE_SECONDS:-60}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: strategy_codebot
      POSTGRES_USER: strategy_codebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  litellm-proxy:
    image: docker.litellm.ai/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_POSTGRES_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}}@litellm-postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VERCEL_AI_GATEWAY_API_KEY: ${VERCEL_AI_GATEWAY_API_KEY:-}
      VERCEL_AI_GATEWAY_API_BASE: ${VERCEL_AI_GATEWAY_API_BASE:-https://ai-gateway.vercel.sh/v1}
      PORTKEY_API_KEY: ${PORTKEY_API_KEY:-}
      PORTKEY_API_BASE: ${PORTKEY_API_BASE:-}
      PORTKEY_VIRTUAL_KEY: ${PORTKEY_VIRTUAL_KEY:-}
      PORTKEY_CONFIG_ID: ${PORTKEY_CONFIG_ID:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      STRATEGY_CODEBOT_LITELLM_DEBUG_LOGS: ${STRATEGY_CODEBOT_LITELLM_DEBUG_LOGS:-0}
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      litellm-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  litellm-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}}
    volumes:
      - litellm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  migration:
    image: strategy-codebot-api:local
    build:
      context: .
      target: runtime
    environment: *api-environment
    command: ["strategy-codebot-migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  knowledge-init:
    image: strategy-codebot-api:local
    build:
      context: .
      target: runtime
    profiles:
      - knowledge-init
    environment: *api-environment
    command:
      - "sh"
      - "-c"
      - 'strategy-codebot knowledge init --embedding-profile production-openrouter --db-url "$$STRATEGY_CODEBOT_KNOWLEDGE_DATABASE_URL"'
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: "no"

  api:
    image: strategy-codebot-api:local
    build:
      context: .
      target: runtime
    environment: *api-environment
    volumes:
      - api-artifacts:/var/lib/strategy-codebot/artifacts
    ports:
      - "${STRATEGY_CODEBOT_API_PORT:-8000}:8000"
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  backtest-worker:
    image: strategy-codebot-backtest-worker:local
    build:
      context: ./workers/backtest-worker
    environment:
      <<: *api-environment
      BACKTEST_WORKER_ID: ${BACKTEST_WORKER_ID:-}
      BACKTEST_WORKER_POLL_INTERVAL_MS: ${BACKTEST_WORKER_POLL_INTERVAL_MS:-2000}
      BACKTEST_WORKER_LEASE_SECONDS: ${BACKTEST_WORKER_LEASE_SECONDS:-300}
      BACKTEST_WORKER_HEARTBEAT_SECONDS: ${BACKTEST_WORKER_HEARTBEAT_SECONDS:-30}
      BACKTEST_WORKER_TIMEOUT_MS: ${BACKTEST_WORKER_TIMEOUT_MS:-600000}
      BACKTEST_WORKER_RUNNER_MODE: ${BACKTEST_WORKER_RUNNER_MODE:-child}
      BACKTEST_WORKER_MAX_CANDLES: ${BACKTEST_WORKER_MAX_CANDLES:-1578240}
      BACKTEST_WORKER_MAX_CANDLES_PER_FETCH: ${BACKTEST_WORKER_MAX_CANDLES_PER_FETCH:-1000}
      BACKTEST_WORKER_MAX_EVENTS: ${BACKTEST_WORKER_MAX_EVENTS:-10000}
      BACKTEST_WORKER_MAX_ARTIFACT_BYTES: ${BACKTEST_WORKER_MAX_ARTIFACT_BYTES:-200000000}
      BACKTEST_WORKER_CACHE_LOCK_TIMEOUT_MS: ${BACKTEST_WORKER_CACHE_LOCK_TIMEOUT_MS:-30000}
      BACKTEST_WORKER_DATA_FETCH_THROTTLE_MS: ${BACKTEST_WORKER_DATA_FETCH_THROTTLE_MS:-250}
      BACKTEST_WORKER_DATA_FETCH_CONCURRENCY: ${BACKTEST_WORKER_DATA_FETCH_CONCURRENCY:-2}
      BACKTEST_WORKER_FETCH_PROGRESS_MIN_PERCENT_STEP: ${BACKTEST_WORKER_FETCH_PROGRESS_MIN_PERCENT_STEP:-5}
      BACKTEST_WORKER_FETCH_PROGRESS_MIN_INTERVAL_MS: ${BACKTEST_WORKER_FETCH_PROGRESS_MIN_INTERVAL_MS:-5000}
      BACKTEST_WORKER_GLOBAL_FETCH_ACTIVE_LIMIT: ${BACKTEST_WORKER_GLOBAL_FETCH_ACTIVE_LIMIT:-2}
      BACKTEST_WORKER_DATA_FETCH_RETRY_ATTEMPTS: ${BACKTEST_WORKER_DATA_FETCH_RETRY_ATTEMPTS:-3}
      BACKTEST_WORKER_DATA_FETCH_RETRY_BASE_MS: ${BACKTEST_WORKER_DATA_FETCH_RETRY_BASE_MS:-500}
      BACKTEST_WORKER_DATA_FETCH_THROTTLE_TTL_MS: ${BACKTEST_WORKER_DATA_FETCH_THROTTLE_TTL_MS:-900000}
      BACKTEST_WORKER_DATA_FETCH_THROTTLE_MAX_KEYS: ${BACKTEST_WORKER_DATA_FETCH_THROTTLE_MAX_KEYS:-10000}
      BACKTEST_WORKER_DEFAULT_WORKSPACE_ACTIVE_LIMIT: ${BACKTEST_WORKER_DEFAULT_WORKSPACE_ACTIVE_LIMIT:-2}
      BACKTEST_WORKER_LONG_RANGE_ACTIVE_LIMIT: ${BACKTEST_WORKER_LONG_RANGE_ACTIVE_LIMIT:-1}
      BACKTEST_WORKER_MARKET_DATA_MODE: ${BACKTEST_WORKER_MARKET_DATA_MODE:-ccxt}
      BACKTEST_WORKER_ALLOWED_EXCHANGES: ${BACKTEST_WORKER_ALLOWED_EXCHANGES:-binance,bybit,okx,kraken}
      BACKTEST_WORKER_DEFAULT_EXCHANGE: ${BACKTEST_WORKER_DEFAULT_EXCHANGE:-binance}
      BACKTEST_WORKER_CANDLE_CACHE_VERSION: ${BACKTEST_WORKER_CANDLE_CACHE_VERSION:-range-v2}
      BACKTEST_WORKER_CACHE_SEGMENT_POLICY: ${BACKTEST_WORKER_CACHE_SEGMENT_POLICY:-monthly}
      BACKTEST_WORKER_CACHE_SEGMENT_TARGET_BYTES: ${BACKTEST_WORKER_CACHE_SEGMENT_TARGET_BYTES:-60000000}
      BACKTEST_PINEFORGE_RUNNER_TIMEOUT_MS: ${BACKTEST_PINEFORGE_RUNNER_TIMEOUT_MS:-120000}
      BACKTEST_PINEFORGE_MAX_BARS: ${BACKTEST_PINEFORGE_MAX_BARS:-1578240}
      BACKTEST_PINEFORGE_MAX_OUTPUT_BYTES: ${BACKTEST_PINEFORGE_MAX_OUTPUT_BYTES:-50000000}
      BACKTEST_PINEFORGE_EQUITY_DOWNSAMPLE_POINTS: ${BACKTEST_PINEFORGE_EQUITY_DOWNSAMPLE_POINTS:-5000}
    volumes:
      - api-artifacts:/var/lib/strategy-codebot/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      pineforge-runner:
        condition: service_healthy
    restart: unless-stopped

  chat-worker:
    image: strategy-codebot-api:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "strategy_codebot.server.chat_worker"]
    environment:
      <<: *api-environment
      STRATEGY_CODEBOT_API_DATABASE_URL: postgresql+psycopg://strategy_codebot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/strategy_codebot
      STRATEGY_CODEBOT_CHAT_WORKER_ID: ${STRATEGY_CODEBOT_CHAT_WORKER_ID:-}
      STRATEGY_CODEBOT_CHAT_WORKER_POLL_INTERVAL_SECONDS: ${STRATEGY_CODEBOT_CHAT_WORKER_POLL_INTERVAL_SECONDS:-2}
    volumes:
      - api-artifacts:/var/lib/strategy-codebot/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from pathlib import Path; import sys; sys.exit(0 if b'strategy_codebot.server.chat_worker' in Path('/proc/1/cmdline').read_bytes() else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  market-data-collector:
    image: strategy-codebot-api:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "strategy_codebot.server.market_data_collector"]
    environment:
      <<: *api-environment
      STRATEGY_CODEBOT_API_DATABASE_URL: postgresql+psycopg://strategy_codebot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/strategy_codebot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from pathlib import Path; import sys; sys.exit(0 if b'strategy_codebot.server.market_data_collector' in Path('/proc/1/cmdline').read_bytes() else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nautilus-paper-worker:
    image: strategy-codebot-nautilus-paper-worker:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        STRATEGY_CODEBOT_UV_EXTRAS: "--extra live --extra nautilus"
    command: ["python", "-m", "strategy_codebot.server.nautilus_paper_worker"]
    environment:
      <<: *api-environment
      STRATEGY_CODEBOT_API_DATABASE_URL: postgresql+psycopg://strategy_codebot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/strategy_codebot
      NAUTILUS_PAPER_WORKER_ID: ${NAUTILUS_PAPER_WORKER_ID:-}
      MAX_RUNTIME_PROCESSES: ${MAX_RUNTIME_PROCESSES:-4}
      MAX_STRATEGIES_PER_RUNTIME: ${MAX_STRATEGIES_PER_RUNTIME:-20}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
      EVENT_BATCH_SIZE: ${EVENT_BATCH_SIZE:-100}
      STREAM_BLOCK_MS: ${STREAM_BLOCK_MS:-1000}
      NAUTILUS_RUNTIME_LEASE_SECONDS: ${NAUTILUS_RUNTIME_LEASE_SECONDS:-60}
      NAUTILUS_WORKER_POLL_INTERVAL_SECONDS: ${NAUTILUS_WORKER_POLL_INTERVAL_SECONDS:-2}
    volumes:
      - api-artifacts:/var/lib/strategy-codebot/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      market-data-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from pathlib import Path; import sys; sys.exit(0 if b'strategy_codebot.server.nautilus_paper_worker' in Path('/proc/1/cmdline').read_bytes() else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    cpus: ${NAUTILUS_PAPER_WORKER_CPUS:-2}
    mem_limit: ${NAUTILUS_PAPER_WORKER_MEM_LIMIT:-2g}
    restart: unless-stopped

  pineforge-runner:
    image: strategy-codebot-pineforge-runner:local
    build:
      context: ./workers/pineforge-runner
      args:
        PINEFORGE_ENGINE_REF: ${PINEFORGE_ENGINE_REF:-v0.10.10}
        PINEFORGE_ENGINE_VERSION: ${PINEFORGE_ENGINE_VERSION:-0.10.10}
        PINEFORGE_CODEGEN_VERSION: ${PINEFORGE_CODEGEN_VERSION:-0.7.5}
    environment:
      PINEFORGE_RUNNER_PORT: "8080"
      PINEFORGE_RUNNER_MODE: ${PINEFORGE_RUNNER_MODE:-native}
      PINEFORGE_ENGINE_VERSION: ${PINEFORGE_ENGINE_VERSION:-0.10.10}
      PINEFORGE_CODEGEN_VERSION: ${PINEFORGE_CODEGEN_VERSION:-0.7.5}
      PINEFORGE_LICENSE_STATE: ${PINEFORGE_LICENSE_STATE:-not_configured}
    volumes:
      - api-artifacts:/var/lib/strategy-codebot/artifacts
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    image: strategy-codebot-web:local
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/}
        NEXT_PUBLIC_DEBUG_AG_UI: ${NEXT_PUBLIC_DEBUG_AG_UI:-false}
    ports:
      - "${STRATEGY_CODEBOT_WEB_PORT:-3000}:3000"
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      STRATEGY_CODEBOT_API_BASE_URL: http://api:8000
      STRATEGY_CODEBOT_DEBUG_AG_UI: ${STRATEGY_CODEBOT_DEBUG_AG_UI:-false}
      STRATEGY_CODEBOT_WEB_DEBUG: "1"
      STRATEGY_CODEBOT_USER_ID: local-user
      STRATEGY_CODEBOT_WORKSPACE_ID: local-workspace
      STRATEGY_CODEBOT_USER_TIER: ${STRATEGY_CODEBOT_USER_TIER:-free}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/}
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_DEBUG_AG_UI: ${NEXT_PUBLIC_DEBUG_AG_UI:-false}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  litellm-postgres-data:
  redis-data:
  api-artifacts:
