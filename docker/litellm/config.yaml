litellm_settings:
  request_timeout: 60
  num_retries: 0
  drop_params: true
  set_verbose: false

router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  allowed_fails: 1
  cooldown_time: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_connection_pool_limit: 5
  store_model_in_db: false
