gateway: litellm
gateway_profiles:
  direct_provider:
    description: Direct provider API keys.
    providers:
      - openai
      - anthropic
      - google
      - groq
      - together
      - fireworks
      - deepinfra
  hosted_router:
    description: Hosted multi-provider routers for resilience.
    providers:
      - openrouter
      - vercel_ai_gateway
      - portkey
  internal_proxy:
    description: Self-hosted LiteLLM proxy for internal routing, budgets, and provider failover.
    providers:
      - litellm_proxy
defaults:
  temperature: 0.2
  max_retries: 2
  request_timeout_seconds: 60
  require_structured_output: true
stage_timeouts:
  classifier: 15
  workflow_fast: 15
  compact_free: 45
  market_research: 45
  strategy_reasoning: 60
  strategy_coding: 60
  pine_code_generation: 90
  balanced_review: 60
  knowledge_learning_review: 60
  repair: 90
route_policy:
  cooldown_seconds: 600
  max_consecutive_failures: 2
  prefer_healthy_routes: true
free_route_policy:
  max_retries: 0
  cooldown_seconds: 600
  max_consecutive_failures: 1
  prefer_healthy_routes: true
free_compact_model_limit: 3
web_search:
  default_mode: auto
  primary_gateway: openrouter
  tool_type: openrouter:web_search
  raw_web_content_policy: citation_metadata_only
  route_capabilities:
    litellm_proxy:
      supports_web_search: true
      web_search_mode: openrouter_server_tool
    openrouter:
      supports_web_search: true
      web_search_mode: openrouter_server_tool
    vercel_ai_gateway:
      supports_web_search: false
      web_search_mode: candidate_unverified
model_tiers:
  dev:
    billing: developer
    max_repair_loops: 1
    allow_tier_escalation: false
    routes_by_stage:
      classifier:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      workflow_fast:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      strategy_reasoning:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      strategy_coding:
        - openrouter/qwen/qwen3-coder:free
        - openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        - openrouter/poolside/laguna-m.1:free
      pine_code_generation:
        - openrouter/qwen/qwen3-coder:free
        - openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        - openrouter/poolside/laguna-m.1:free
      balanced_review:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      knowledge_learning_review:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      repair:
        - openrouter/qwen/qwen3-coder:free
        - openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        - openrouter/poolside/laguna-m.1:free
  free:
    billing: free
    max_repair_loops: 1
    allow_tier_escalation: false
    routes_by_stage:
      classifier:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      workflow_fast:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      strategy_reasoning:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      strategy_coding:
        - openrouter/qwen/qwen3-coder:free
        - openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        - openrouter/poolside/laguna-m.1:free
      pine_code_generation:
        - openrouter/qwen/qwen3-coder:free
        - openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        - openrouter/poolside/laguna-m.1:free
      balanced_review:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      knowledge_learning_review:
        - openrouter/meta-llama/llama-3.3-70b-instruct:free
        - openrouter/nex-agi/nex-n2-pro:free
        - openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      repair:
        - openrouter/qwen/qwen3-coder:free
        - openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        - openrouter/poolside/laguna-m.1:free
  paid_low:
    billing: paid
    max_repair_loops: 2
    max_llm_repair_loops: 1
    max_post_repair_reviews: 1
    allow_deterministic_repair_after_budget: true
    allow_tier_escalation: false
    routes_by_stage:
      classifier:
        - litellm_proxy/paid_low.strategy_reasoning_gemini_lite
        - litellm_proxy/paid_low.strategy_reasoning
        - litellm_proxy/paid_low.strategy_reasoning_vercel
        - litellm_proxy/paid_medium.strategy_reasoning
      workflow_fast:
        - litellm_proxy/paid_low.workflow_fast_gemini_flash
        - litellm_proxy/paid_low.strategy_reasoning_gemini_lite
        - litellm_proxy/paid_low.strategy_reasoning
        - litellm_proxy/paid_medium.strategy_reasoning
      strategy_reasoning:
        - litellm_proxy/paid_low.strategy_reasoning
        - litellm_proxy/paid_low.strategy_reasoning_vercel
        - litellm_proxy/paid_low.strategy_reasoning_gemini_lite
        - litellm_proxy/paid_medium.strategy_reasoning
      strategy_coding:
        - litellm_proxy/paid_low.strategy_coding
        - litellm_proxy/paid_low.strategy_coding_deepseek
        - litellm_proxy/paid_low.strategy_coding_qwen
        - litellm_proxy/paid_medium.strategy_coding
      pine_code_generation:
        - litellm_proxy/paid_low.pine_code_generation_qwen
        - litellm_proxy/paid_low.pine_code_generation_vercel
        - litellm_proxy/paid_medium.pine_code_generation
        - litellm_proxy/paid_low.pine_code_generation
      balanced_review:
        - litellm_proxy/paid_low.balanced_review
        - litellm_proxy/paid_low.balanced_review_vercel
        - litellm_proxy/paid_low.balanced_review_minimax
        - litellm_proxy/paid_medium.balanced_review
      knowledge_learning_review:
        - litellm_proxy/paid_low.balanced_review
        - litellm_proxy/paid_low.balanced_review_vercel
        - litellm_proxy/paid_low.balanced_review_minimax
        - litellm_proxy/paid_medium.balanced_review
      repair:
        - litellm_proxy/paid_low.repair
        - litellm_proxy/paid_low.repair_qwen
        - litellm_proxy/paid_low.repair_vercel
        - litellm_proxy/paid_medium.repair
  paid_medium:
    billing: paid
    max_repair_loops: 2
    allow_tier_escalation: false
    routes_by_stage:
      classifier:
        - litellm_proxy/paid_medium.strategy_reasoning
      workflow_fast:
        - litellm_proxy/paid_medium.workflow_fast_gemini_flash
        - litellm_proxy/paid_medium.strategy_reasoning
      strategy_reasoning:
        - litellm_proxy/paid_medium.strategy_reasoning
      strategy_coding:
        - litellm_proxy/paid_medium.strategy_coding
      pine_code_generation:
        - litellm_proxy/paid_medium.pine_code_generation
      balanced_review:
        - litellm_proxy/paid_medium.balanced_review
      knowledge_learning_review:
        - litellm_proxy/paid_medium.balanced_review
      repair:
        - litellm_proxy/paid_medium.repair
  paid_high:
    billing: paid
    max_repair_loops: 2
    allow_tier_escalation: false
    routes_by_stage:
      classifier:
        - litellm_proxy/paid_high.strategy_reasoning
      workflow_fast:
        - litellm_proxy/paid_high.workflow_fast_gemini_flash
        - litellm_proxy/paid_high.strategy_reasoning
      strategy_reasoning:
        - litellm_proxy/paid_high.strategy_reasoning
      strategy_coding:
        - litellm_proxy/paid_high.strategy_coding
      pine_code_generation:
        - litellm_proxy/paid_high.pine_code_generation
      balanced_review:
        - litellm_proxy/paid_high.balanced_review
      knowledge_learning_review:
        - litellm_proxy/paid_high.balanced_review
      repair:
        - litellm_proxy/paid_high.repair

agents:
  orchestrator:
    primary: openai/gpt-5.5
    fallbacks:
      - anthropic/claude-sonnet-4-6
      - openrouter/openai/gpt-5.5
      - openrouter/anthropic/claude-opus-4.8
    capabilities:
      - reasoning
      - structured_output
  intake:
    primary: openai/gpt-5.1-mini
    capabilities:
      - structured_output
  trading_analyst:
    primary: openai/gpt-5.5
    fallbacks:
      - anthropic/claude-opus-4-8
      - openrouter/openai/gpt-5.5
      - openrouter/anthropic/claude-opus-4.8
      - openrouter/google/gemini-3.1-pro-preview
    capabilities:
      - reasoning
  pine_specialist:
    primary: openai/gpt-5.5
    fallbacks:
      - anthropic/claude-sonnet-4-6
      - openrouter/anthropic/claude-opus-4.8
      - openrouter/openai/gpt-5.5
    capabilities:
      - code
      - pine_v6
  mql5_specialist:
    primary: anthropic/claude-sonnet-4-6
    fallbacks:
      - openai/gpt-5.5
      - openrouter/anthropic/claude-opus-4.8
    capabilities:
      - code
      - mql5
  risk_reviewer:
    primary: openai/gpt-5.5
    fallbacks:
      - anthropic/claude-sonnet-4-6
      - openrouter/google/gemini-3.1-pro-preview
    capabilities:
      - reasoning
      - policy
  validator:
    primary: openai/gpt-5.1-mini
    capabilities:
      - tool_use
      - structured_output
  critic:
    primary: openrouter/google/gemini-3.1-pro-preview
    fallbacks:
      - anthropic/claude-sonnet-4-6
    policy: different_provider_than_generator
    capabilities:
      - critique
      - reasoning
  knowledge_curator:
    primary: openai/gpt-5.1-mini
    capabilities:
      - retrieval
      - summarization
  harness_auditor:
    primary: openai/gpt-5.1-mini
    capabilities:
      - structured_output
      - audit

provider_model_mappings:
  openrouter:
    cheap_quality:
      strategy_reasoning:
        - openrouter/moonshotai/kimi-k2.5
        - openrouter/moonshotai/kimi-k2-thinking
      strategy_coding:
        - openrouter/moonshotai/kimi-k2.5
        - openrouter/minimax/minimax-m3
      pine_code_generation:
        - openrouter/moonshotai/kimi-k2.5
        - openrouter/qwen/qwen3-coder
      long_context_worker:
        - openrouter/minimax/minimax-m3
      balanced_review:
        - openrouter/moonshotai/kimi-k2.5
        - openrouter/minimax/minimax-m3
    notes:
      - Kimi K2 Thinking is the preferred low-cost reasoning option for strategy synthesis trials.
      - Qwen3 Coder free is useful for cheap Pine/code-generation probes, but should be gated by validation.
      - MiniMax M3 is the low-cost long-context worker candidate.
